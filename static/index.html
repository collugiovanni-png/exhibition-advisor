<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exhibition Advisor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="bg-layer" aria-hidden="true"></div>
    <div class="container">
        <header class="hero">
            <h1>EXHIBITION<br><span class="highlight">ADVISOR</span></h1>
            <p>Spietato. Perentorio. Infallibile.</p>
            <button id="autoplay-btn" onclick="toggleAutoplay()" class="btn-primary" style="margin-top: 1.5rem;">📡 Avvia Flusso Radio</button>
        </header>

        <section id="autoplay-display" class="glass-panel hidden" style="text-align: center; margin-bottom: 4rem; padding: 3rem; border: 2px solid var(--accent);">
            <div style="font-size: 0.9rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 1rem;">📻 In Onda 📻</div>
            <h2 id="autoplay-title" style="font-size: 2rem; margin-bottom: 1.5rem;">Cercando una mostra da stroncare...</h2>
            <p id="autoplay-judgment" class="highlight" style="font-size: 1.5rem; font-weight: bold;"></p>
        </section>

        <section class="latest-exhibitions">
            <div class="section-header">
                <h2>Ultime Mostre dai Feed</h2>
                <button onclick="loadExhibitions()" id="refresh-btn" class="btn-secondary">Aggiorna Feed</button>
            </div>
            <div id="feed-loading" class="hidden loading">Scraping dei feed d'arte...</div>
            <div id="exhibitions-list" class="grid-container" style="margin-bottom: 4rem;">
                <!-- Le mostre verranno caricate qui dinamicamente -->
            </div>
        </section>

        <section class="url-analyzer glass-panel">
            <h2>Analizza un URL specifico</h2>
            <div class="input-group">
                <input type="text" id="article-url" placeholder="Incolla l'URL dell'articolo da analizzare...">
                <button id="analyze-btn" onclick="analyzeUrl()">Giudica</button>
            </div>
            <div id="url-loading" class="hidden loading">Sto valutando la mostra... (preparati al peggio)</div>
            <div id="url-result" class="hidden"></div>
        </section>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const audioPlayer = document.getElementById('audio-player');
        audioPlayer.volume = 1.0;

        // --- APPLICAZIONE GUADAGNO PER LA VOCE DI SCARPA ---
        let audioCtx;
        let gainNode;
        function initAudioAPI() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaElementSource(audioPlayer);
                gainNode = audioCtx.createGain();
                source.connect(gainNode);
                gainNode.connect(audioCtx.destination);
            }
        }
        
        // Inizializza l'AudioContext al primo click sulla pagina (necessario per policy browser)
        document.addEventListener('click', initAudioAPI, { once: true });

        audioPlayer.addEventListener('play', () => {
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            if (gainNode) {
                // Applichiamo un boost di volume (5.0x) sia ai titoli ElevenLabs che ai vecchi file di Scarpa
                if (audioPlayer.src.includes('title_') || audioPlayer.src.match(/_[1-5]\.mp3$/)) {
                    gainNode.gain.value = 5.0; 
                } else {
                    gainNode.gain.value = 1.0; // Volume normale per gli altri file
                }
            }
        });

        let exhibitionsData = []; // Store raw loaded data for autoplay
        let autoplayTimeout = null;
        let isAutoplaying = false;

        /** Triadi di colori scuri (gradiente pagina) — cambiano a ogni nuovo giudizio */
        const JUDGMENT_PALETTES = [
            ['#0f172a', '#1e1b4b', '#4c1d95'],
            ['#0c1929', '#134e4a', '#0e7490'],
            ['#1a1033', '#5b21b6', '#831843'],
            ['#0f172a', '#14532d', '#166534'],
            ['#1c1917', '#7c2d12', '#9a3412'],
            ['#0f172a', '#1e3a8a', '#075985'],
            ['#18181b', '#713f12', '#854d0e'],
            ['#0f172a', '#4c0519', '#881337'],
            ['#042f2e', '#115e59', '#155e75'],
            ['#1e1b4b', '#6d28d9', '#be185d'],
            ['#0c4a6e', '#0e7490', '#0f766e'],
            ['#292524', '#9a3412', '#b45309'],
            ['#172554', '#3730a3', '#6b21a8'],
            ['#052e16', '#166534', '#14532d'],
            ['#2e1065', '#5b21b6', '#c026d3'],
            ['#0f172a', '#0f766e', '#0369a1'],
            ['#1c1917', '#422006', '#713f12'],
            ['#164e63', '#155e75', '#0e7490'],
            ['#3b0764', '#6b21a8', '#be185d'],
            ['#0f172a', '#1c4532', '#365314'],
            ['#1e293b', '#7c3aed', '#db2777'],
            ['#0c0a09', '#7f1d1d', '#9f1239'],
            ['#064e3b', '#047857', '#0d9488'],
            ['#1e1b4b', '#312e81', '#0e7490'],
        ];

        function setJudgmentBackground() {
            const i = Math.floor(Math.random() * JUDGMENT_PALETTES.length);
            const [a, b, c] = JUDGMENT_PALETTES[i];
            const el = document.getElementById('bg-layer');
            if (!el) return;
            /* Impostazione diretta: molti browser non aggiornano bene il gradiente su body con sole CSS variables */
            el.style.background = `linear-gradient(145deg, ${a} 0%, ${b} 48%, ${c} 100%)`;
        }

        function playAudio(filename) {
            audioPlayer.onended = null;
            audioPlayer.src = '/static/audio/' + filename;
            audioPlayer.play().catch(e => {
                alert("Impossibile riprodurre l'audio. Assicurati che il file " + filename + " esista in static/audio/");
            });
        }

        // --- NUOVO MOTORE DI SINTESI VOCALE LOCALE (GRATIS) ---
        function speakText(text, onEnd) {
            // Ferma eventuali voci in corso
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'it-IT';
            
            // Cerchiamo una voce italiana formale (Alice su Mac è ottima)
            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => v.lang === 'it-IT' && (v.name.includes('Alice') || v.name.includes('Luca')));
            if (preferredVoice) utterance.voice = preferredVoice;
            
            utterance.pitch = 0.9;
            utterance.rate = 0.95;
            utterance.volume = 1.0; // Ripristinato a 1.0 (alto e giusto) come da feedback
            
            utterance.onend = () => { if (onEnd) onEnd(); };
            utterance.onerror = (e) => { console.error(e); if (onEnd) onEnd(); };
            
            window.speechSynthesis.speak(utterance);
        }

        function playSequence(titleFile, synthesisText) {
            setJudgmentBackground();
            
            // 1. Riproduce il Titolo (ElevenLabs - Alta Qualità)
            if (titleFile && titleFile !== 'undefined') {
                audioPlayer.src = '/static/audio/' + titleFile;
                audioPlayer.onended = function() {
                    // 2. Terminato il titolo, la macchina "intellettuale" legge la sintesi (Gratis)
                    speakText(synthesisText);
                    audioPlayer.onended = null;
                };
                audioPlayer.play().catch(e => {
                    // Se l'audio del titolo fallisce, passa direttamente alla sintesi
                    speakText(synthesisText);
                });
            } else {
                speakText(synthesisText);
            }
        }

        function createClusterCard(cluster) {
            const card = document.createElement('div');
            card.className = 'exhibition-card glass-panel';
            
            // Sintesi intellettuale anni '60-'70
            const synthesis = cluster.synthesis;
            
            // Generiamo i piccoli badge per ogni testata coinvolta
            let sourceBadges = cluster.articles.map(art => {
                let badgeClass = 'badge-sbirciata';
                if (art.judgment.category === 'schifezza') badgeClass = 'badge-schifezza';
                if (art.judgment.category === 'capolavoro') badgeClass = 'badge-capolavoro';
                return `<span class="source-tag ${badgeClass}">${art.source}</span>`;
            }).join(' ');

            card.innerHTML = `
                <div class="card-header">
                    <div class="sources-list">${sourceBadges}</div>
                    <span class="cluster-count">${cluster.sources_count} fonti incrociate</span>
                </div>
                <h3>${cluster.main_title}</h3>
                <div class="intellectual-critique">
                    <p class="synthesis-text">"${synthesis.text}"</p>
                    <div class="tone-label">Frequenza: ${synthesis.tone}</div>
                </div>
                <div class="original-articles">
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem;">Fonti originali:</p>
                    <ul style="list-style: none; padding: 0;">
                        ${cluster.articles.map(art => `
                            <li style="font-size: 0.85rem; margin-bottom: 0.3rem;">
                                → <a href="${art.link}" target="_blank" style="color: var(--accent);">${art.source}: ${art.summary.substring(0, 40)}...</a>
                            </li>
                        `).join('')}
                    </ul>
                </div>
                <div class="card-actions" style="margin-top: 1.5rem;">
                    <button class="play-btn dialettico" onclick="playSequence('${cluster.title_audio_file}', '${synthesis.text.replace(/'/g, "\\'")}')">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> 
                        Ascolta Sintesi Dialettica
                    </button>
                </div>
            `;
            return card;
        }

        async function analyzeUrl() {
            const urlInput = document.getElementById('article-url').value;
            if (!urlInput) return;

            const loading = document.getElementById('url-loading');
            const resultDiv = document.getElementById('url-result');
            const btn = document.getElementById('analyze-btn');

            loading.classList.remove('hidden');
            resultDiv.innerHTML = '';
            btn.disabled = true;

            try {
                const res = await fetch('/api/analyze_url', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: urlInput})
                });
                const data = await res.json();
                
                if(data.error) {
                    resultDiv.innerHTML = `<p class="error">${data.error}</p>`;
                } else {
                    resultDiv.innerHTML = '';
                    setJudgmentBackground();
                    // Mock di un cluster per il risultato singolo Link Diretto
                    const mockCluster = {
                        main_title: data.article.title,
                        title_audio_file: data.article.title_audio_file,
                        synthesis: { text: "Un'indagine solitaria che attende il confronto con la prassi collettiva per svelare la sua reale natura.", tone: "riflessivo" },
                        articles: [data.article],
                        sources_count: 1
                    };
                    resultDiv.appendChild(createClusterCard(mockCluster));
                }
            } catch (err) {
                resultDiv.innerHTML = `<p class="error">Errore di rete.</p>`;
            } finally {
                loading.classList.add('hidden');
                resultDiv.classList.remove('hidden');
                btn.disabled = false;
            }
        }

        async function loadExhibitions() {
            const container = document.getElementById('exhibitions-list');
            const loading = document.getElementById('feed-loading');
            const btn = document.getElementById('refresh-btn');
            
            container.innerHTML = '';
            loading.classList.remove('hidden');
            btn.disabled = true;

            try {
                const res = await fetch('/api/exhibitions');
                const data = await res.json();
                
                // Manteniamo una struttura compatibile o la aggiorniamo per l'autoplay
                // Per ora usiamo il primo articolo di ogni cluster come base per i dati grezzi
                exhibitionsData = data.clusters.map(c => ({
                    ...c.articles[0],
                    title: c.main_title,
                    title_audio_file: c.title_audio_file,
                    synthesis_text: c.synthesis.text // Salviamo il testo per l'autoplay
                }));
                
                data.clusters.forEach(cluster => {
                    container.appendChild(createClusterCard(cluster));
                });
                setJudgmentBackground();
            } catch(e) {
                console.error(e);
                container.innerHTML = `<p class="error">Impossibile caricare i cluster critici.</p>`;
            } finally {
                loading.classList.add('hidden');
                btn.disabled = false;
            }
        }

        // --- AUTOPLAY RADIO LOGIC ---
        function toggleAutoplay() {
            const btn = document.getElementById('autoplay-btn');
            if (isAutoplaying) {
                // Stop everything
                isAutoplaying = false;
                if(autoplayTimeout) clearTimeout(autoplayTimeout);
                window.speechSynthesis.cancel();
                audioPlayer.pause();
                
                btn.innerHTML = "📡 Avvia Flusso Radio";
                btn.classList.remove('active');
                document.getElementById('autoplay-display').classList.add('hidden');
            } else {
                // Start
                if(exhibitionsData.length === 0) {
                    alert("Attendi il caricamento delle mostre dai feed!");
                    return;
                }
                isAutoplaying = true;
                btn.innerHTML = "⏹ Ferma Flusso";
                btn.classList.add('active');
                document.getElementById('autoplay-display').classList.remove('hidden');
                
                // Ensure system is clear before starting cycle
                window.speechSynthesis.cancel();
                audioPlayer.pause();
                playRandomExhibition();
            }
        }

        function playRandomExhibition() {
            if (!isAutoplaying || exhibitionsData.length === 0) return;
            
            const exh = exhibitionsData[Math.floor(Math.random() * exhibitionsData.length)];
            
            document.getElementById('autoplay-title').innerText = exh.title;
            document.getElementById('autoplay-judgment').innerText = "...in attesa di giudizio...";
            
            // 1. Legge il titolo con ElevenLabs
            if (exh.title_audio_file) {
                audioPlayer.src = '/static/audio/' + exh.title_audio_file;
                audioPlayer.onended = function() {
                    if(!isAutoplaying) return;
                    
                    // 2. Mostra il testo e cambia sfondo
                    document.getElementById('autoplay-judgment').innerText = exh.synthesis_text;
                    setJudgmentBackground();

                    // 3. Legge la sintesi intellettuale (GRATIS)
                    speakText(exh.synthesis_text, () => {
                        if(isAutoplaying) {
                            autoplayTimeout = setTimeout(playRandomExhibition, 3000);
                        }
                    });
                };
                audioPlayer.play().catch(e => {
                    if(isAutoplaying) autoplayTimeout = setTimeout(playRandomExhibition, 3000);
                });
            } else {
                // Fallback
                document.getElementById('autoplay-judgment').innerText = exh.synthesis_text;
                setJudgmentBackground();
                speakText(exh.synthesis_text, () => {
                    if(isAutoplaying) autoplayTimeout = setTimeout(playRandomExhibition, 3000);
                });
            }
        }

        // Colore iniziale + aggiornamento quando arrivano i feed
        setJudgmentBackground();
        loadExhibitions();
    </script>
</body>
</html>
