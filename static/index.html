<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exhibition Advisor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="bg-layer" aria-hidden="true"></div>
    <div class="container">
        <header class="hero">
            <h1>EXHIBITION<br><span class="highlight">ADVISOR</span></h1>
            <p>Spietato. Perentorio. Infallibile.</p>
            <button id="autoplay-btn" onclick="toggleAutoplay()" class="btn-primary" style="margin-top: 1.5rem;">📡 Avvia Flusso Radio</button>
        </header>

        <section id="autoplay-display" class="glass-panel hidden" style="text-align: center; margin-bottom: 4rem; padding: 3rem; border: 2px solid var(--accent);">
            <div style="font-size: 0.9rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 1rem;">📻 In Onda 📻</div>
            <h2 id="autoplay-title" style="font-size: 2rem; margin-bottom: 1.5rem;">Cercando una mostra da stroncare...</h2>
            <p id="autoplay-judgment" class="highlight" style="font-size: 1.5rem; font-weight: bold;"></p>
        </section>

        <section class="latest-exhibitions">
            <div class="section-header">
                <h2>Ultime Mostre dai Feed</h2>
                <button onclick="loadExhibitions()" id="refresh-btn" class="btn-secondary">Aggiorna Feed</button>
            </div>
            <div id="feed-loading" class="hidden loading">Scraping dei feed d'arte...</div>
            <div id="exhibitions-list" class="grid-container" style="margin-bottom: 4rem;">
                <!-- Le mostre verranno caricate qui dinamicamente -->
            </div>
        </section>

        <section class="url-analyzer glass-panel">
            <h2>Analizza un URL specifico</h2>
            <div class="input-group">
                <input type="text" id="article-url" placeholder="Incolla l'URL dell'articolo da analizzare...">
                <button id="analyze-btn" onclick="analyzeUrl()">Giudica</button>
            </div>
            <div id="url-loading" class="hidden loading">Sto valutando la mostra... (preparati al peggio)</div>
            <div id="url-result" class="hidden"></div>
        </section>
    </div>

    <script>
        let exhibitionsData = []; 
        let autoplayTimeout = null;
        let isAutoplaying = false;

        // Prefissi informativi tipo Giornale Radio
        const TITLE_PREFIXES = [
            "In primo piano l'esposizione: ",
            "Si segnala la mostra: ",
            "Dagli aggiornamenti dei feed d'arte: ",
            "Riflettori sull'evento: ",
            "Focus informativo per: ",
            "Notizie sull'esposizione: "
        ];

        /** Triadi di colori scuri — cambiano a ogni nuovo giudizio */
        const JUDGMENT_PALETTES = [
            ['#0f172a', '#1e1b4b', '#4c1d95'],
            ['#0c1929', '#134e4a', '#0e7490'],
            ['#1a1033', '#5b21b6', '#831843'],
            ['#0f172a', '#14532d', '#166534'],
            ['#1c1917', '#7c2d12', '#9a3412'],
            ['#0f172a', '#1e3a8a', '#075985'],
            ['#18181b', '#713f12', '#854d0e'],
            ['#0f172a', '#4c0519', '#881337'],
            ['#042f2e', '#115e59', '#155e75'],
            ['#1e1b4b', '#6d28d9', '#be185d'],
        ];

        function setJudgmentBackground() {
            const i = Math.floor(Math.random() * JUDGMENT_PALETTES.length);
            const [a, b, c] = JUDGMENT_PALETTES[i];
            const el = document.getElementById('bg-layer');
            if (el) el.style.background = `linear-gradient(145deg, ${a} 0%, ${b} 48%, ${c} 100%)`;
        }

        // --- MOTORE DI SINTESI VOCALE LOCALE (GRATIS & BILANCIATA) ---
        function speakText(text, type, onEnd) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'it-IT';
            
            const voices = window.speechSynthesis.getVoices();
            
            if (type === 'title') {
                // Voce Maschile (Titoli) - Luca
                const v = voices.find(v => v.lang === 'it-IT' && v.name.includes('Luca'));
                if (v) utterance.voice = v;
                utterance.pitch = 0.75; 
                utterance.rate = 0.85;  
            } else {
                // Voce Femminile (Analisi) - Alice
                const v = voices.find(v => v.lang === 'it-IT' && v.name.includes('Alice'));
                if (v) utterance.voice = v;
                utterance.pitch = 0.8;  // Più profonda e calda (non stridula)
                utterance.rate = 0.88;  
            }
            
            utterance.volume = 1.0; 
            utterance.onend = () => { if (onEnd) onEnd(); };
            utterance.onerror = (e) => { console.error(e); if (onEnd) onEnd(); };
            
            window.speechSynthesis.speak(utterance);
        }

        function playSequence(titleText, synthesisText, city, sourceCount) {
            setJudgmentBackground();
            
            // 1. Costruzione frase informativa articolata
            const prefix = TITLE_PREFIXES[Math.floor(Math.random() * TITLE_PREFIXES.length)];
            let articulatedTitle = prefix + titleText + ". ";
            
            if (city && city !== 'None' && city !== 'undefined') {
                articulatedTitle += "Un evento attualmente in corso a " + city + ". ";
            }
            
            if (sourceCount > 1) {
                articulatedTitle += "La notizia è stata segnalata da ben " + sourceCount + " fonti diverse.";
            } else {
                articulatedTitle += "L'informazione proviene da una singola fonte presente nei feed.";
            }

            // 2. Lettura Titolo Informativo (Voce Maschile Solenne)
            speakText(articulatedTitle, 'title', () => {
                // 3. Pausa di riflessione (1.2 secondi)
                setTimeout(() => {
                    // 4. Lettura Analisi Critica (Voce Femminile Calda)
                    speakText(synthesisText, 'analysis');
                }, 1200);
            });
        }

        function createClusterCard(cluster) {
            const card = document.createElement('div');
            card.className = 'exhibition-card glass-panel';
            const synthesis = cluster.synthesis || { text: "Analisi in corso...", tone: "sconosciuto" };
            
            let sourceBadges = (cluster.articles || []).map(art => {
                let badgeClass = 'badge-sbirciata';
                if (art.judgment.category === 'schifezza') badgeClass = 'badge-schifezza';
                if (art.judgment.category === 'capolavoro') badgeClass = 'badge-capolavoro';
                return `<span class="source-tag ${badgeClass}">${art.source}</span>`;
            }).join(' ');

            card.innerHTML = `
                <div class="card-header">
                    <div class="sources-list">${sourceBadges}</div>
                    <span class="cluster-count">${cluster.sources_count} fonti incrociate</span>
                </div>
                <h3>${cluster.main_title}</h3>
                <div class="intellectual-critique">
                    <p class="synthesis-text">"${synthesis.text}"</p>
                    <div class="tone-label">Frequenza: ${synthesis.tone}</div>
                </div>
                <div class="original-articles">
                    <ul style="list-style: none; padding: 0;">
                        ${(cluster.articles || []).map(art => `
                            <li style="font-size: 0.85rem; margin-bottom: 0.3rem;">
                                → <a href="${art.link}" target="_blank" style="color: var(--accent);">${art.source}: ${art.summary.substring(0, 40)}...</a>
                            </li>
                        `).join('')}
                    </ul>
                </div>
                <div class="card-actions" style="margin-top: 1.5rem;">
                    <button class="play-btn dialettico" 
                            data-main-title="${cluster.main_title.replace(/"/g, '&quot;')}" 
                            data-city="${cluster.city || ''}"
                            data-sources="${cluster.sources_count}"
                            data-synthesis-text="${encodeURIComponent(synthesis.text)}">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> 
                        Ascolta Bollettino Critico
                    </button>
                </div>
            `;

            const playBtn = card.querySelector('.play-btn');
            playBtn.addEventListener('click', () => {
                const titleText = playBtn.getAttribute('data-main-title');
                const city = playBtn.getAttribute('data-city');
                const sources = playBtn.getAttribute('data-sources');
                const synthesisText = decodeURIComponent(playBtn.getAttribute('data-synthesis-text'));
                playSequence(titleText, synthesisText, city, sources);
            });

            return card;
        }

        async function loadExhibitions() {
            const container = document.getElementById('exhibitions-list');
            const loading = document.getElementById('feed-loading');
            const btn = document.getElementById('refresh-btn');
            
            container.innerHTML = '';
            loading.classList.remove('hidden');
            btn.disabled = true;

            try {
                const res = await fetch('/api/exhibitions');
                const data = await res.json();
                
                exhibitionsData = (data.clusters || []).map(c => {
                    const art = (c.articles && c.articles.length > 0) ? c.articles[0] : {};
                    const synth = c.synthesis || { text: "", tone: "indefinito" };
                    return {
                        ...art,
                        title: c.main_title || art.title || "Mostra senza titolo",
                        city: c.city,
                        sources_count: c.sources_count,
                        synthesis_text: synth.text
                    };
                });
                
                data.clusters.forEach(cluster => {
                    try {
                        container.appendChild(createClusterCard(cluster));
                    } catch (e) { console.error(e); }
                });
                setJudgmentBackground();
            } catch(e) {
                console.error(e);
                container.innerHTML = `<p class="error">Impossibile caricare i cluster critici. <br><small>${e.message}</small></p>`;
            } finally {
                loading.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function toggleAutoplay() {
            const btn = document.getElementById('autoplay-btn');
            if (isAutoplaying) {
                isAutoplaying = false;
                if(autoplayTimeout) clearTimeout(autoplayTimeout);
                window.speechSynthesis.cancel();
                btn.innerHTML = "📡 Avvia Flusso Radio";
                btn.classList.remove('active');
                document.getElementById('autoplay-display').classList.add('hidden');
            } else {
                if(exhibitionsData.length === 0) return alert("Attendi il caricamento delle mostre!");
                isAutoplaying = true;
                btn.innerHTML = "⏹ Ferma Flusso";
                btn.classList.add('active');
                document.getElementById('autoplay-display').classList.remove('hidden');
                playRandomExhibition();
            }
        }

        function playRandomExhibition() {
            if (!isAutoplaying || exhibitionsData.length === 0) return;
            const exh = exhibitionsData[Math.floor(Math.random() * exhibitionsData.length)];
            
            document.getElementById('autoplay-title').innerText = exh.title;
            document.getElementById('autoplay-judgment').innerText = "...preparazione analisi...";
            
            playSequence(exh.title, exh.synthesis_text, exh.city, exh.sources_count);
            
            // Per l'autoplay dobbiamo sapere quando finisce la sequenza per programmare la successiva
            // speakText non è facile da concatenare così, quindi usiamo un timeout approssimativo o modifichiamo playSequence
            // Per ora semplifichiamo: ricalcoliamo il timeout basandoci sulla lunghezza testo
            const estimatedDuration = (exh.title.length + exh.synthesis_text.length) * 80 + 3000;
            autoplayTimeout = setTimeout(playRandomExhibition, estimatedDuration);
        }

        async function analyzeUrl() {
            const urlInput = document.getElementById('article-url').value;
            if (!urlInput) return;
            const loading = document.getElementById('url-loading');
            const resultDiv = document.getElementById('url-result');
            loading.classList.remove('hidden');
            resultDiv.innerHTML = '';

            try {
                const res = await fetch('/api/analyze_url', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: urlInput})
                });
                const data = await res.json();
                if(data.error) {
                    resultDiv.innerHTML = `<p class="error">${data.error}</p>`;
                } else {
                    const mock = {
                        main_title: data.article.title,
                        city: data.article.city,
                        synthesis: { text: "Un'indagine solitaria che attende il confronto con la prassi collettiva per svelare la sua reale natura.", tone: "riflessivo" },
                        articles: [data.article],
                        sources_count: 1
                    };
                    resultDiv.appendChild(createClusterCard(mock));
                }
            } catch (err) {
                resultDiv.innerHTML = `<p class="error">Errore di rete.</p>`;
            } finally {
                loading.classList.add('hidden');
                resultDiv.classList.remove('hidden');
            }
        }

        // Init
        setJudgmentBackground();
        loadExhibitions();
        document.addEventListener('click', () => { window.speechSynthesis.getVoices(); }, { once: true });
    </script>
</body>
</html>
